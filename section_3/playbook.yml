- name: Install Docker and run script
  hosts: local
  become: true
  vars:
    image_name: http-checker
    container_name: http-checker

  tasks:

  # --Часть 1. Установка Docker --------------------------------------

    - name: Install dependencies for Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) \
          signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker
      apt:
        name: docker-ce
        state: present
        update_cache: true
    
    - name: Start Docker service
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add current user to docker group
      user:
        name: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
        groups: docker
        append: true

    - name: Reset connection to apply docker group
      meta: reset_connection
    
    - name: Verify Docker installation
      command: docker --version
      register: docker_ver
      changed_when: false

    - name: Show Docker version 
      debug:
        msg: "{{ docker_ver.stdout }}"


  # --Часть 2. Сборка образа и запуск контейнера ---------------------

    - name: Build Docker image
      shell: docker build -t "{{ image_name }}" -f "{{ playbook_dir }}/../section_2/Dockerfile" "{{ playbook_dir }}/../section_1"
      changed_when: true

    - name: Remove old container if exists
      shell: docker rm -f "{{ container_name }}" || true
      changed_when: false

    - name: Run script container
      shell: docker run --name "{{ container_name }}" "{{ image_name }}"
      register: run_result
      changed_when: true


  # --Часть 3. Получение логов и проверка кода завершения ------------

    - name: Get container logs
      shell: docker logs "{{ container_name }}" 2>&1
      register: container_logs
      changed_when: false

    - name: Show container logs
      debug:
        msg: "{{ container_logs.stdout_lines }}"

    - name: Check exit code
      command: >
        docker inspect "{{ container_name }}"
        --format="{{ '{{' }}.State.ExitCode{{ '}}' }}"
      register: exit_code
      changed_when: false

    - name: Fail if script exited with error
      fail:
        msg: "Container exited with code {{ exit_code.stdout }}"
      when: exit_code.stdout | int != 0
